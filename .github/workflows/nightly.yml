name: atlas-nightly

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: atlas-nightly-main
  cancel-in-progress: false

jobs:
  live-foundation:
    name: live-foundation-and-supply-chain
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out complete history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.0
      - name: Run Phase 00 S08 acceptance gate
        shell: pwsh
        run: ./scripts/verify-s08.ps1 -Live -History -SupplyChain -CleanClone -ContainerRuntime docker
      - name: Retain nightly reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: s08-nightly-${{ github.sha }}
          path: .tmp/s07-reports/
          if-no-files-found: error
          retention-days: 14
