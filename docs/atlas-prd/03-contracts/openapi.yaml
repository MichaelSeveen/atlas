openapi: 3.1.1
info:
  title: Atlas Wallet and Financial Operations API
  version: 2026-07-20
  summary: Security-first contracts for wallet, transfers, merchant payments, operations, and reporting.
  description: |
    Reference contract for the Atlas portfolio platform. Financial amounts are integer minor-unit
    strings. Money-moving commands are idempotent. Browser applications use a backend-for-frontend
    session; merchant and service integrations use scoped machine credentials. This file is a
    deliberately curated baseline, not an automatically inferred description of handlers.
  contact:
    name: Atlas API Governance
  license:
    name: Portfolio reference - no production authorization
servers:
  - url: https://api.staging.atlas.example
    description: Synthetic staging environment
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Platform
  - name: Identity
  - name: Wallets
  - name: Beneficiaries
  - name: Transfers
  - name: Merchant payments
  - name: Webhooks
  - name: Settlement
  - name: Operations
  - name: Reporting
security:
  - bffSession: []
paths:
  /health/live:
    get:
      operationId: getLiveness
      tags: [Platform]
      summary: Report process liveness only
      description: Returns process liveness without checking or disclosing dependency topology.
      security: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/Traceparent'
      responses:
        '200':
          description: API process is alive
          headers:
            X-Request-Id: {$ref: '#/components/headers/XRequestId'}
            X-Correlation-Id: {$ref: '#/components/headers/XCorrelationId'}
            traceparent: {$ref: '#/components/headers/Traceparent'}
            Cache-Control: {$ref: '#/components/headers/CacheControl'}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Liveness'}
              example: {status: alive}
        '400': {$ref: '#/components/responses/RequestMalformed'}
        '413': {$ref: '#/components/responses/RequestTooLarge'}
        '415': {$ref: '#/components/responses/UnsupportedMediaType'}
        '500': {$ref: '#/components/responses/InternalError'}

  /health/ready:
    get:
      operationId: getReadiness
      tags: [Platform]
      summary: Report safe dependency and migration readiness
      description: Fails closed when required dependencies or migration state cannot be verified; never returns topology or migration detail.
      security: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/Traceparent'
      responses:
        '200':
          description: Required dependency and migration checks are ready
          headers:
            X-Request-Id: {$ref: '#/components/headers/XRequestId'}
            X-Correlation-Id: {$ref: '#/components/headers/XCorrelationId'}
            traceparent: {$ref: '#/components/headers/Traceparent'}
            Cache-Control: {$ref: '#/components/headers/CacheControl'}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Readiness'}
              example: {status: ready}
        '400': {$ref: '#/components/responses/RequestMalformed'}
        '413': {$ref: '#/components/responses/RequestTooLarge'}
        '415': {$ref: '#/components/responses/UnsupportedMediaType'}
        '500': {$ref: '#/components/responses/InternalError'}
        '503': {$ref: '#/components/responses/ServiceUnavailable'}

  /version:
    get:
      operationId: getVersion
      tags: [Platform]
      summary: Report safe build and contract identity
      description: Returns only source revision, canonical contract version, and UTC build time.
      security: []
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/CorrelationId'
        - $ref: '#/components/parameters/Traceparent'
      responses:
        '200':
          description: Safe build identity
          headers:
            X-Request-Id: {$ref: '#/components/headers/XRequestId'}
            X-Correlation-Id: {$ref: '#/components/headers/XCorrelationId'}
            traceparent: {$ref: '#/components/headers/Traceparent'}
            Cache-Control: {$ref: '#/components/headers/CacheControl'}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/VersionInfo'}
              example:
                source_revision: 710bca0a3c5dd44fb009512e2200a65b5da59dcd
                contract_version: 2026-07-20
                build_time: '2026-07-20T00:00:00Z'
        '400': {$ref: '#/components/responses/RequestMalformed'}
        '413': {$ref: '#/components/responses/RequestTooLarge'}
        '415': {$ref: '#/components/responses/UnsupportedMediaType'}
        '500': {$ref: '#/components/responses/InternalError'}

  /v1/me:
    get:
      operationId: getCurrentPrincipal
      tags: [Identity]
      summary: Get the authenticated principal and active tenant context
      responses:
        '200':
          description: Current principal
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Principal'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'

  /v1/wallets:
    get:
      operationId: listWallets
      tags: [Wallets]
      summary: List wallets visible to the current principal
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: currency
          in: query
          schema:
            $ref: '#/components/schemas/Currency'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/WalletStatus'
      responses:
        '200':
          description: Wallet page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Wallet'
                  page:
                    $ref: '#/components/schemas/PageInfo'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'

  /v1/wallets/{wallet_id}:
    parameters:
      - $ref: '#/components/parameters/WalletId'
    get:
      operationId: getWallet
      tags: [Wallets]
      summary: Get an authorized wallet view
      responses:
        '200':
          description: Wallet
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wallet'
        '404':
          $ref: '#/components/responses/NotFoundOrConcealed'

  /v1/wallets/{wallet_id}/balance:
    parameters:
      - $ref: '#/components/parameters/WalletId'
    get:
      operationId: getWalletBalance
      tags: [Wallets]
      summary: Get ledger, pending, held, and available balance components
      description: |
        Returns a versioned balance projection. It is not a substitute for journal history. The
        `as_of_sequence` allows support and verification tooling to correlate the projection with
        the ledger.
      responses:
        '200':
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalance'
        '404':
          $ref: '#/components/responses/NotFoundOrConcealed'

  /v1/wallets/{wallet_id}/transactions:
    parameters:
      - $ref: '#/components/parameters/WalletId'
    get:
      operationId: listWalletTransactions
      tags: [Wallets]
      summary: List a stable, authorization-filtered transaction timeline
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: type
          in: query
          schema:
            type: string
            maxLength: 64
      responses:
        '200':
          description: Transaction page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TransactionSummary'
                  page:
                    $ref: '#/components/schemas/PageInfo'
        '404':
          $ref: '#/components/responses/NotFoundOrConcealed'

  /v1/beneficiaries:
    get:
      operationId: listBeneficiaries
      tags: [Beneficiaries]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Beneficiary page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Beneficiary'
                  page:
                    $ref: '#/components/schemas/PageInfo'
    post:
      operationId: createBeneficiary
      tags: [Beneficiaries]
      summary: Create a beneficiary subject to verification, risk, and cooling-off policy
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBeneficiaryRequest'
      responses:
        '201':
          description: Beneficiary created
          headers:
            Location:
              schema: {type: string, format: uri-reference}
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Beneficiary'
        '403':
          $ref: '#/components/responses/StepUpRequired'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /v1/beneficiaries/{beneficiary_id}:
    parameters:
      - $ref: '#/components/parameters/BeneficiaryId'
    get:
      operationId: getBeneficiary
      tags: [Beneficiaries]
      responses:
        '200':
          description: Beneficiary with masked destination details
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Beneficiary'
        '404':
          $ref: '#/components/responses/NotFoundOrConcealed'
    delete:
      operationId: deactivateBeneficiary
      tags: [Beneficiaries]
      summary: Deactivate a beneficiary without erasing financial history
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      responses:
        '204':
          description: Deactivated
        '403':
          $ref: '#/components/responses/StepUpRequired'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /v1/transfers:
    post:
      operationId: createTransfer
      tags: [Transfers]
      summary: Create an internal or external transfer command
      description: |
        A successful response means the durable command and its synchronous financial protections
        were committed. External completion can remain asynchronous. A timeout never implies that
        the economic command failed; retry with the same idempotency key or query the returned ID.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransferRequest'
            examples:
              internal:
                value:
                  source_wallet_id: wal_01JAT1AS00000000000001
                  destination:
                    type: atlas_wallet
                    wallet_id: wal_01JAT1AS00000000000002
                  amount: {amount_minor: '250000', currency: NGN}
                  client_reference: payroll-july-042
                  description: Synthetic contractor payment
              external:
                value:
                  source_wallet_id: wal_01JAT1AS00000000000001
                  destination:
                    type: beneficiary
                    beneficiary_id: ben_01JAT1AS00000000000001
                  amount: {amount_minor: '750000', currency: NGN}
                  quote_id: quo_01JAT1AS00000000000001
                  client_reference: vendor-invoice-771
      responses:
        '201':
          description: Transfer created
          headers:
            Location:
              schema: {type: string, format: uri-reference}
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '202':
          description: Durable transfer exists but external outcome is ambiguous or still pending
          headers:
            Location:
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '403':
          $ref: '#/components/responses/StepUpRequired'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
        '429':
          $ref: '#/components/responses/RateLimited'
    get:
      operationId: listTransfers
      tags: [Transfers]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TransferStatus'
        - name: client_reference
          in: query
          schema: {type: string, maxLength: 100}
      responses:
        '200':
          description: Transfer page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transfer'
                  page:
                    $ref: '#/components/schemas/PageInfo'

  /v1/transfers/{transfer_id}:
    parameters:
      - $ref: '#/components/parameters/TransferId'
    get:
      operationId: getTransfer
      tags: [Transfers]
      summary: Get transfer lifecycle and safe financial references
      responses:
        '200':
          description: Transfer
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '404':
          $ref: '#/components/responses/NotFoundOrConcealed'

  /v1/transfers/{transfer_id}/cancellations:
    parameters:
      - $ref: '#/components/parameters/TransferId'
    post:
      operationId: requestTransferCancellation
      tags: [Transfers]
      summary: Request cancellation only where the state machine and rail allow it
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason: {type: string, minLength: 3, maxLength: 500}
      responses:
        '202':
          description: Cancellation request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'

  /v1/external-transfer-quotes:
    post:
      operationId: createExternalTransferQuote
      tags: [Transfers]
      summary: Create a short-lived, destination-bound transfer quote
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [source_wallet_id, beneficiary_id, send_amount]
              properties:
                source_wallet_id:
                  $ref: '#/components/schemas/WalletId'
                beneficiary_id:
                  $ref: '#/components/schemas/BeneficiaryId'
                send_amount:
                  $ref: '#/components/schemas/Money'
      responses:
        '201':
          description: Quote
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferQuote'
        '422':
          $ref: '#/components/responses/ValidationFailed'

  /v1/payment-intents:
    post:
      operationId: createPaymentIntent
      tags: [Merchant payments]
      security:
        - merchantOAuth: [payments:write]
      summary: Create a merchant payment intent
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      responses:
        '201':
          description: Payment intent
          headers:
            Location:
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntent'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationFailed'
    get:
      operationId: listPaymentIntents
      tags: [Merchant payments]
      security:
        - merchantOAuth: [payments:read]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PaymentIntentStatus'
      responses:
        '200':
          description: Payment intent page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/PaymentIntent'}
                  page: {$ref: '#/components/schemas/PageInfo'}

  /v1/payment-intents/{payment_intent_id}:
    parameters:
      - $ref: '#/components/parameters/PaymentIntentId'
    get:
      operationId: getPaymentIntent
      tags: [Merchant payments]
      security:
        - merchantOAuth: [payments:read]
      responses:
        '200':
          description: Payment intent
          headers:
            ETag: {$ref: '#/components/headers/ETag'}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PaymentIntent'}
        '404': {$ref: '#/components/responses/NotFoundOrConcealed'}

  /v1/payment-intents/{payment_intent_id}/captures:
    parameters:
      - $ref: '#/components/parameters/PaymentIntentId'
    post:
      operationId: capturePaymentIntent
      tags: [Merchant payments]
      security:
        - merchantOAuth: [payments:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [amount]
              properties:
                amount: {$ref: '#/components/schemas/Money'}
      responses:
        '201':
          description: Capture accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/PaymentIntent'}
        '409': {$ref: '#/components/responses/Conflict'}
        '412': {$ref: '#/components/responses/PreconditionFailed'}
        '422': {$ref: '#/components/responses/ValidationFailed'}

  /v1/refunds:
    post:
      operationId: createRefund
      tags: [Merchant payments]
      security:
        - merchantOAuth: [refunds:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefundRequest'
      responses:
        '201':
          description: Refund created
          headers:
            Location:
              schema: {type: string, format: uri-reference}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Refund'}
        '202':
          description: Refund pending external confirmation
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Refund'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/ValidationFailed'}

  /v1/refunds/{refund_id}:
    parameters:
      - $ref: '#/components/parameters/RefundId'
    get:
      operationId: getRefund
      tags: [Merchant payments]
      security:
        - merchantOAuth: [refunds:read]
      responses:
        '200':
          description: Refund
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Refund'}
        '404': {$ref: '#/components/responses/NotFoundOrConcealed'}

  /v1/webhook-endpoints:
    get:
      operationId: listWebhookEndpoints
      tags: [Webhooks]
      security:
        - merchantOAuth: [webhooks:read]
      responses:
        '200':
          description: Webhook endpoints
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/WebhookEndpoint'}
    post:
      operationId: createWebhookEndpoint
      tags: [Webhooks]
      security:
        - merchantOAuth: [webhooks:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [url, subscribed_event_types]
              properties:
                url: {type: string, format: uri, maxLength: 2048}
                subscribed_event_types:
                  type: array
                  minItems: 1
                  maxItems: 100
                  uniqueItems: true
                  items: {type: string, maxLength: 120}
      responses:
        '201':
          description: Endpoint created in pending-verification state; secret shown once
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/WebhookEndpoint'
                  - type: object
                    required: [secret]
                    properties:
                      secret: {type: string, writeOnly: true}
        '403': {$ref: '#/components/responses/StepUpRequired'}
        '422': {$ref: '#/components/responses/ValidationFailed'}

  /v1/webhook-deliveries:
    get:
      operationId: listWebhookDeliveries
      tags: [Webhooks]
      security:
        - merchantOAuth: [webhooks:read]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: endpoint_id
          in: query
          schema: {$ref: '#/components/schemas/WebhookEndpointId'}
        - name: event_id
          in: query
          schema: {$ref: '#/components/schemas/EventId'}
      responses:
        '200':
          description: Delivery page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data:
                    type: array
                    items: {$ref: '#/components/schemas/WebhookDelivery'}
                  page: {$ref: '#/components/schemas/PageInfo'}

  /v1/webhook-deliveries/{delivery_id}/replays:
    parameters:
      - $ref: '#/components/parameters/WebhookDeliveryId'
    post:
      operationId: replayWebhookDelivery
      tags: [Webhooks]
      security:
        - merchantOAuth: [webhooks:write]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason: {type: string, minLength: 3, maxLength: 500}
      responses:
        '202':
          description: New replay delivery scheduled
          content:
            application/json:
              schema: {$ref: '#/components/schemas/WebhookDelivery'}
        '409': {$ref: '#/components/responses/Conflict'}

  /v1/settlement-files:
    post:
      operationId: createSettlementFileImport
      tags: [Settlement]
      summary: Register an uploaded synthetic provider settlement file for asynchronous import
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [provider, object_id, content_sha256, schema_version]
              properties:
                provider: {type: string, maxLength: 64}
                object_id: {$ref: '#/components/schemas/OpaqueId'}
                content_sha256: {type: string, pattern: '^[a-f0-9]{64}$'}
                schema_version: {type: string, maxLength: 40}
      responses:
        '202':
          description: Import accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/SettlementFile'}
        '409': {$ref: '#/components/responses/Conflict'}
        '422': {$ref: '#/components/responses/ValidationFailed'}

  /v1/settlement-batches:
    get:
      operationId: listSettlementBatches
      tags: [Settlement]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: provider
          in: query
          schema: {type: string, maxLength: 64}
        - name: status
          in: query
          schema: {type: string, enum: [open, ready_for_close, closed, reopened]}
      responses:
        '200':
          description: Settlement batch page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/SettlementBatch'}}
                  page: {$ref: '#/components/schemas/PageInfo'}

  /v1/reconciliation-runs:
    post:
      operationId: createReconciliationRun
      tags: [Settlement]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [settlement_batch_id, ruleset_version]
              properties:
                settlement_batch_id: {$ref: '#/components/schemas/SettlementBatchId'}
                ruleset_version: {type: string, maxLength: 80}
      responses:
        '202':
          description: Reconciliation accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ReconciliationRun'}
        '409': {$ref: '#/components/responses/Conflict'}

  /v1/reconciliation-runs/{run_id}:
    parameters:
      - name: run_id
        in: path
        required: true
        schema: {$ref: '#/components/schemas/ReconciliationRunId'}
    get:
      operationId: getReconciliationRun
      tags: [Settlement]
      responses:
        '200':
          description: Reconciliation run
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ReconciliationRun'}
        '404': {$ref: '#/components/responses/NotFoundOrConcealed'}

  /v1/operations/search:
    get:
      operationId: searchOperationsObjects
      tags: [Operations]
      summary: Privileged, audited cross-domain search with masked results
      parameters:
        - name: q
          in: query
          required: true
          schema: {type: string, minLength: 3, maxLength: 200}
        - name: type
          in: query
          schema: {type: string, enum: [customer, wallet, transfer, payment, provider_reference, case]}
      responses:
        '200':
          description: Authorized masked search results
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    maxItems: 100
                    items: {$ref: '#/components/schemas/OperationsSearchResult'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '429': {$ref: '#/components/responses/RateLimited'}

  /v1/cases:
    get:
      operationId: listCases
      tags: [Operations]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: status
          in: query
          schema: {type: string, enum: [open, investigating, pending_approval, resolved, closed]}
        - name: assigned_to_me
          in: query
          schema: {type: boolean}
      responses:
        '200':
          description: Case page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/Case'}}
                  page: {$ref: '#/components/schemas/PageInfo'}
    post:
      operationId: createCase
      tags: [Operations]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [type, priority, subjects, reason]
              properties:
                type: {type: string, maxLength: 64}
                priority: {type: string, enum: [low, medium, high, critical]}
                subjects:
                  type: array
                  minItems: 1
                  maxItems: 20
                  items: {$ref: '#/components/schemas/SubjectReference'}
                reason: {type: string, minLength: 3, maxLength: 2000}
      responses:
        '201':
          description: Case created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Case'}

  /v1/cases/{case_id}:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    get:
      operationId: getCase
      tags: [Operations]
      responses:
        '200':
          description: Case
          headers:
            ETag: {$ref: '#/components/headers/ETag'}
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Case'}
        '404': {$ref: '#/components/responses/NotFoundOrConcealed'}
    patch:
      operationId: updateCaseMetadata
      tags: [Operations]
      parameters:
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/merge-patch+json:
            schema:
              type: object
              additionalProperties: false
              properties:
                priority: {type: string, enum: [low, medium, high, critical]}
                due_at: {type: [string, 'null'], format: date-time}
      responses:
        '200':
          description: Case updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Case'}
        '412': {$ref: '#/components/responses/PreconditionFailed'}

  /v1/cases/{case_id}/transitions:
    parameters:
      - $ref: '#/components/parameters/CaseId'
    post:
      operationId: transitionCase
      tags: [Operations]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/IfMatch'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [to_status, reason]
              properties:
                to_status: {type: string, enum: [investigating, pending_approval, resolved, closed]}
                reason: {type: string, minLength: 3, maxLength: 2000}
      responses:
        '200':
          description: Case transitioned
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Case'}
        '409': {$ref: '#/components/responses/Conflict'}
        '412': {$ref: '#/components/responses/PreconditionFailed'}

  /v1/statements:
    post:
      operationId: createStatement
      tags: [Reporting]
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [wallet_id, period_start, period_end, formats]
              properties:
                wallet_id: {$ref: '#/components/schemas/WalletId'}
                period_start: {type: string, format: date}
                period_end: {type: string, format: date}
                timezone: {type: string, default: Africa/Lagos, maxLength: 64}
                formats:
                  type: array
                  minItems: 1
                  uniqueItems: true
                  items: {type: string, enum: [pdf, csv, json]}
      responses:
        '202':
          description: Statement generation accepted
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Statement'}
        '422': {$ref: '#/components/responses/ValidationFailed'}
    get:
      operationId: listStatements
      tags: [Reporting]
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Statement page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/Statement'}}
                  page: {$ref: '#/components/schemas/PageInfo'}

  /v1/statements/{statement_id}:
    parameters:
      - $ref: '#/components/parameters/StatementId'
    get:
      operationId: getStatement
      tags: [Reporting]
      responses:
        '200':
          description: Statement metadata; downloads require a separate short-lived grant
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Statement'}
        '404': {$ref: '#/components/responses/NotFoundOrConcealed'}

  /v1/audit-events:
    get:
      operationId: listAuditEvents
      tags: [Reporting]
      summary: Privileged audit search; access to this endpoint is itself audited
      parameters:
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Cursor'
        - name: actor_id
          in: query
          schema: {$ref: '#/components/schemas/OpaqueId'}
        - name: action
          in: query
          schema: {type: string, maxLength: 120}
        - name: correlation_id
          in: query
          schema: {$ref: '#/components/schemas/OpaqueId'}
      responses:
        '200':
          description: Masked audit event page
          content:
            application/json:
              schema:
                type: object
                required: [data, page]
                properties:
                  data: {type: array, items: {$ref: '#/components/schemas/AuditEvent'}}
                  page: {$ref: '#/components/schemas/PageInfo'}
        '403': {$ref: '#/components/responses/Forbidden'}

components:
  securitySchemes:
    bffSession:
      type: apiKey
      in: cookie
      name: __Host-atlas_session
      description: Secure, HttpOnly, SameSite session cookie managed by the BFF.
    merchantOAuth:
      type: oauth2
      description: OAuth 2.0 client-credentials access token with audience and scope enforcement.
      flows:
        clientCredentials:
          tokenUrl: https://identity.staging.atlas.example/oauth2/token
          scopes:
            payments:read: Read payment intents
            payments:write: Create and capture payment intents
            refunds:read: Read refunds
            refunds:write: Create refunds
            webhooks:read: Read webhook endpoints and deliveries
            webhooks:write: Manage endpoints and replay deliveries

  parameters:
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      description: Optional opaque request identifier; the server validates and replaces unsafe values.
      schema: {$ref: '#/components/schemas/OpaqueId'}
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Optional opaque correlation identifier for observability only; never authorization input.
      schema: {$ref: '#/components/schemas/OpaqueId'}
    Traceparent:
      name: traceparent
      in: header
      required: false
      description: W3C trace context used only for observability; malformed values are replaced.
      schema:
        type: string
        maxLength: 55
        pattern: '^[0-9a-f]{2}-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Unique within authenticated actor, tenant, operation, and API version.
      schema:
        type: string
        minLength: 16
        maxLength: 128
        pattern: '^[A-Za-z0-9._:-]+$'
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema: {type: string, minLength: 3, maxLength: 200}
    PageSize:
      name: page_size
      in: query
      schema: {type: integer, minimum: 1, maximum: 100, default: 25}
    Cursor:
      name: cursor
      in: query
      schema: {type: string, minLength: 16, maxLength: 2048}
    WalletId:
      name: wallet_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/WalletId'}
    BeneficiaryId:
      name: beneficiary_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/BeneficiaryId'}
    TransferId:
      name: transfer_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/TransferId'}
    PaymentIntentId:
      name: payment_intent_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/PaymentIntentId'}
    RefundId:
      name: refund_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/RefundId'}
    WebhookDeliveryId:
      name: delivery_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/WebhookDeliveryId'}
    CaseId:
      name: case_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/CaseId'}
    StatementId:
      name: statement_id
      in: path
      required: true
      schema: {$ref: '#/components/schemas/StatementId'}

  headers:
    XRequestId:
      schema: {$ref: '#/components/schemas/OpaqueId'}
    XCorrelationId:
      schema: {$ref: '#/components/schemas/OpaqueId'}
    Traceparent:
      schema:
        type: string
        pattern: '^00-[0-9a-f]{32}-[0-9a-f]{16}-[0-9a-f]{2}$'
    CacheControl:
      schema: {type: string, const: no-store}
    ETag:
      schema: {type: string}
    IdempotencyReplayed:
      schema: {type: boolean}
      description: True when returning the persisted response for a previous identical request.

  responses:
    AuthenticationRequired:
      description: Authentication required or invalid
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
          example:
            type: https://atlas.example/problems/authentication-required
            title: Authentication required
            status: 401
            code: AUTHENTICATION_REQUIRED
            request_id: req_01JAT1AS00000000000001
            retryable: false
    StepUpRequired:
      description: A fresh higher-assurance authentication is required
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
          example:
            type: https://atlas.example/problems/step-up-required
            title: Additional verification required
            status: 403
            code: STEP_UP_REQUIRED
            request_id: req_01JAT1AS00000000000001
            retryable: false
    Forbidden:
      description: Action is not authorized
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    NotFoundOrConcealed:
      description: Resource is absent or deliberately concealed by authorization policy
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    ValidationFailed:
      description: Request is syntactically valid but violates semantic/business input rules
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    Conflict:
      description: State, idempotency, duplicate, or concurrency conflict
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
          examples:
            idempotencyMismatch:
              value:
                type: https://atlas.example/problems/idempotency-conflict
                title: Idempotency key conflict
                status: 409
                code: IDEMPOTENCY_KEY_REUSED_WITH_DIFFERENT_REQUEST
                request_id: req_01JAT1AS00000000000001
                retryable: false
            outcomeUnknown:
              value:
                type: https://atlas.example/problems/transfer-outcome-unknown
                title: Transfer outcome is still being determined
                status: 409
                code: TRANSFER_OUTCOME_UNKNOWN
                request_id: req_01JAT1AS00000000000001
                retryable: true
    PreconditionFailed:
      description: ETag/resource version no longer matches
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    RateLimited:
      description: Request or sensitive business-flow rate limit exceeded
      headers:
        Retry-After:
          schema: {type: integer, minimum: 1}
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}

    RequestMalformed:
      description: Request method, query, or body shape is not supported by this operation
      headers:
        X-Request-Id: {$ref: '#/components/headers/XRequestId'}
        X-Correlation-Id: {$ref: '#/components/headers/XCorrelationId'}
        traceparent: {$ref: '#/components/headers/Traceparent'}
        Cache-Control: {$ref: '#/components/headers/CacheControl'}
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    RequestTooLarge:
      description: Request body exceeds the explicit foundation endpoint limit
      headers:
        X-Request-Id: {$ref: '#/components/headers/XRequestId'}
        X-Correlation-Id: {$ref: '#/components/headers/XCorrelationId'}
        traceparent: {$ref: '#/components/headers/Traceparent'}
        Cache-Control: {$ref: '#/components/headers/CacheControl'}
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    UnsupportedMediaType:
      description: Request content encoding or media type is unsupported
      headers:
        X-Request-Id: {$ref: '#/components/headers/XRequestId'}
        X-Correlation-Id: {$ref: '#/components/headers/XCorrelationId'}
        traceparent: {$ref: '#/components/headers/Traceparent'}
        Cache-Control: {$ref: '#/components/headers/CacheControl'}
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    InternalError:
      description: Internal failure with no implementation detail disclosure
      headers:
        X-Request-Id: {$ref: '#/components/headers/XRequestId'}
        X-Correlation-Id: {$ref: '#/components/headers/XCorrelationId'}
        traceparent: {$ref: '#/components/headers/Traceparent'}
        Cache-Control: {$ref: '#/components/headers/CacheControl'}
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
    ServiceUnavailable:
      description: Required dependency or migration state is not ready; no topology is disclosed
      headers:
        X-Request-Id: {$ref: '#/components/headers/XRequestId'}
        X-Correlation-Id: {$ref: '#/components/headers/XCorrelationId'}
        traceparent: {$ref: '#/components/headers/Traceparent'}
        Cache-Control: {$ref: '#/components/headers/CacheControl'}
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/Problem'}
          example:
            type: https://atlas.example/problems/dependency-degraded
            title: Service unavailable
            status: 503
            code: DEPENDENCY_DEGRADED
            request_id: req_01JAT1AS00000000000001
            correlation_id: cor_01JAT1AS00000000000001
            retryable: true

  schemas:
    OpaqueId:
      type: string
      minLength: 10
      maxLength: 64
      pattern: '^[a-z]{2,8}_[0-9A-HJKMNP-TV-Z]{20,32}$'
    Liveness:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: {type: string, const: alive}
    Readiness:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: {type: string, const: ready}
    VersionInfo:
      type: object
      additionalProperties: false
      required: [source_revision, contract_version, build_time]
      properties:
        source_revision:
          type: string
          pattern: '^(development|[0-9a-f]{7,64})$'
        contract_version:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        build_time: {type: string, format: date-time}
    WalletId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
      examples: [wal_01JAT1AS00000000000001]
    BeneficiaryId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
      examples: [ben_01JAT1AS00000000000001]
    TransferId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
      examples: [trf_01JAT1AS00000000000001]
    PaymentIntentId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
      examples: [pi_01JAT1AS00000000000001]
    RefundId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
      examples: [ref_01JAT1AS00000000000001]
    WebhookEndpointId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
    WebhookDeliveryId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
    EventId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
    SettlementBatchId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
    ReconciliationRunId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
    CaseId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]
    StatementId:
      allOf: [{$ref: '#/components/schemas/OpaqueId'}]

    Currency:
      type: string
      pattern: '^[A-Z]{3}$'
      examples: [NGN, USD]
    Money:
      type: object
      additionalProperties: false
      required: [amount_minor, currency]
      properties:
        amount_minor:
          type: string
          pattern: '^(0|[1-9][0-9]{0,18})$'
          description: Non-negative integer minor units encoded as a string.
          examples: ['250000']
        currency:
          $ref: '#/components/schemas/Currency'
    SignedMoney:
      type: object
      additionalProperties: false
      required: [amount_minor, currency]
      properties:
        amount_minor:
          type: string
          pattern: '^-?(0|[1-9][0-9]{0,18})$'
        currency: {$ref: '#/components/schemas/Currency'}

    Principal:
      type: object
      additionalProperties: false
      required: [id, type, display_name, active_tenant_id, assurance, permissions]
      properties:
        id: {$ref: '#/components/schemas/OpaqueId'}
        type: {type: string, enum: [customer, merchant_user, workforce, machine]}
        display_name: {type: string, maxLength: 200}
        active_tenant_id: {oneOf: [{$ref: '#/components/schemas/OpaqueId'}, {type: 'null'}]}
        assurance: {type: string, enum: [baseline, stepped_up, phishing_resistant]}
        permissions:
          type: array
          uniqueItems: true
          items: {type: string, maxLength: 120}

    WalletStatus:
      type: string
      enum: [pending, active, restricted, frozen, closing, closed]
    Wallet:
      type: object
      additionalProperties: false
      required: [id, owner_type, owner_id, currency, status, balance, version, created_at]
      properties:
        id: {$ref: '#/components/schemas/WalletId'}
        owner_type: {type: string, enum: [customer, merchant, platform]}
        owner_id: {$ref: '#/components/schemas/OpaqueId'}
        currency: {$ref: '#/components/schemas/Currency'}
        status: {$ref: '#/components/schemas/WalletStatus'}
        balance: {$ref: '#/components/schemas/WalletBalance'}
        version: {type: integer, minimum: 1}
        created_at: {type: string, format: date-time}
        closed_at: {type: [string, 'null'], format: date-time}
    WalletBalance:
      type: object
      additionalProperties: false
      required: [currency, ledger, pending_in, pending_out, held, available, as_of_sequence, calculated_at]
      properties:
        currency: {$ref: '#/components/schemas/Currency'}
        ledger: {$ref: '#/components/schemas/SignedMoney'}
        pending_in: {$ref: '#/components/schemas/Money'}
        pending_out: {$ref: '#/components/schemas/Money'}
        held: {$ref: '#/components/schemas/Money'}
        available: {$ref: '#/components/schemas/SignedMoney'}
        as_of_sequence: {type: string, pattern: '^[0-9]{1,30}$'}
        calculated_at: {type: string, format: date-time}

    BeneficiaryStatus:
      type: string
      enum: [pending_verification, cooling_off, active, blocked, deactivated]
    Beneficiary:
      type: object
      additionalProperties: false
      required: [id, type, display_name, destination, status, created_at, version]
      properties:
        id: {$ref: '#/components/schemas/BeneficiaryId'}
        type: {type: string, enum: [atlas_wallet, bank_account]}
        display_name: {type: string, maxLength: 200}
        destination:
          type: object
          additionalProperties: false
          required: [masked_label]
          properties:
            institution_code: {type: [string, 'null'], maxLength: 64}
            institution_name: {type: [string, 'null'], maxLength: 200}
            masked_label: {type: string, maxLength: 100}
        status: {$ref: '#/components/schemas/BeneficiaryStatus'}
        cooling_off_ends_at: {type: [string, 'null'], format: date-time}
        created_at: {type: string, format: date-time}
        version: {type: integer, minimum: 1}
    CreateBeneficiaryRequest:
      oneOf:
        - type: object
          title: Atlas wallet beneficiary
          additionalProperties: false
          required: [type, wallet_id, display_name]
          properties:
            type: {const: atlas_wallet}
            wallet_id: {$ref: '#/components/schemas/WalletId'}
            display_name: {type: string, minLength: 1, maxLength: 200}
        - type: object
          title: Synthetic bank beneficiary
          additionalProperties: false
          required: [type, institution_code, account_number, display_name]
          properties:
            type: {const: bank_account}
            institution_code: {type: string, minLength: 2, maxLength: 64}
            account_number: {type: string, minLength: 6, maxLength: 34, writeOnly: true}
            display_name: {type: string, minLength: 1, maxLength: 200}

    TransferStatus:
      type: string
      enum:
        - created
        - risk_review
        - funds_reserved
        - submitted
        - outcome_unknown
        - completed
        - failed
        - cancelled
        - reversal_pending
        - reversed
    TransferDestination:
      oneOf:
        - type: object
          additionalProperties: false
          required: [type, wallet_id]
          properties:
            type: {const: atlas_wallet}
            wallet_id: {$ref: '#/components/schemas/WalletId'}
        - type: object
          additionalProperties: false
          required: [type, beneficiary_id]
          properties:
            type: {const: beneficiary}
            beneficiary_id: {$ref: '#/components/schemas/BeneficiaryId'}
    CreateTransferRequest:
      type: object
      additionalProperties: false
      required: [source_wallet_id, destination, amount, client_reference]
      properties:
        source_wallet_id: {$ref: '#/components/schemas/WalletId'}
        destination: {$ref: '#/components/schemas/TransferDestination'}
        amount: {$ref: '#/components/schemas/Money'}
        quote_id:
          oneOf: [{$ref: '#/components/schemas/OpaqueId'}, {type: 'null'}]
        client_reference: {type: string, minLength: 1, maxLength: 100}
        description: {type: string, maxLength: 280}
    Transfer:
      type: object
      additionalProperties: false
      required: [id, source_wallet_id, destination, amount, status, client_reference, created_at, updated_at, version]
      properties:
        id: {$ref: '#/components/schemas/TransferId'}
        source_wallet_id: {$ref: '#/components/schemas/WalletId'}
        destination: {$ref: '#/components/schemas/TransferDestination'}
        amount: {$ref: '#/components/schemas/Money'}
        fee: {$ref: '#/components/schemas/Money'}
        status: {$ref: '#/components/schemas/TransferStatus'}
        client_reference: {type: string}
        provider_reference_masked: {type: [string, 'null'], maxLength: 100}
        hold_id: {oneOf: [{$ref: '#/components/schemas/OpaqueId'}, {type: 'null'}]}
        journal_ids:
          type: array
          items: {$ref: '#/components/schemas/OpaqueId'}
        failure_category: {type: [string, 'null'], maxLength: 80}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        completed_at: {type: [string, 'null'], format: date-time}
        version: {type: integer, minimum: 1}
    TransactionSummary:
      type: object
      additionalProperties: false
      required: [id, type, direction, amount, status, effective_at]
      properties:
        id: {$ref: '#/components/schemas/OpaqueId'}
        type: {type: string, maxLength: 64}
        direction: {type: string, enum: [in, out, neutral]}
        amount: {$ref: '#/components/schemas/Money'}
        status: {type: string, maxLength: 64}
        description: {type: string, maxLength: 280}
        effective_at: {type: string, format: date-time}
        posted_at: {type: [string, 'null'], format: date-time}
    TransferQuote:
      type: object
      additionalProperties: false
      required: [id, send_amount, fee, receive_amount, expires_at, bound_beneficiary_id]
      properties:
        id: {$ref: '#/components/schemas/OpaqueId'}
        send_amount: {$ref: '#/components/schemas/Money'}
        fee: {$ref: '#/components/schemas/Money'}
        receive_amount: {$ref: '#/components/schemas/Money'}
        rate:
          type: object
          additionalProperties: false
          required: [numerator, denominator]
          properties:
            numerator: {type: string, pattern: '^[1-9][0-9]{0,18}$'}
            denominator: {type: string, pattern: '^[1-9][0-9]{0,18}$'}
        bound_beneficiary_id: {$ref: '#/components/schemas/BeneficiaryId'}
        expires_at: {type: string, format: date-time}

    PaymentIntentStatus:
      type: string
      enum: [requires_payment_method, requires_authorization, authorized, partially_captured, succeeded, cancelled, failed]
    CaptureMethod:
      type: string
      enum: [automatic, manual]
    CreatePaymentIntentRequest:
      type: object
      additionalProperties: false
      required: [amount, capture_method, merchant_reference]
      properties:
        amount: {$ref: '#/components/schemas/Money'}
        capture_method: {$ref: '#/components/schemas/CaptureMethod'}
        merchant_reference: {type: string, minLength: 1, maxLength: 100}
        description: {type: string, maxLength: 280}
        metadata:
          type: object
          maxProperties: 20
          additionalProperties: {type: string, maxLength: 500}
    PaymentIntent:
      type: object
      additionalProperties: false
      required: [id, amount, amount_capturable, amount_received, status, capture_method, merchant_reference, created_at, version]
      properties:
        id: {$ref: '#/components/schemas/PaymentIntentId'}
        amount: {$ref: '#/components/schemas/Money'}
        amount_capturable: {$ref: '#/components/schemas/Money'}
        amount_received: {$ref: '#/components/schemas/Money'}
        status: {$ref: '#/components/schemas/PaymentIntentStatus'}
        capture_method: {$ref: '#/components/schemas/CaptureMethod'}
        merchant_reference: {type: string}
        client_secret:
          type: [string, 'null']
          writeOnly: true
          description: Returned only where a client-side confirmation flow is explicitly used.
        created_at: {type: string, format: date-time}
        expires_at: {type: [string, 'null'], format: date-time}
        version: {type: integer, minimum: 1}
    RefundStatus:
      type: string
      enum: [created, submitted, outcome_unknown, succeeded, failed, cancelled]
    CreateRefundRequest:
      type: object
      additionalProperties: false
      required: [payment_intent_id, amount, reason]
      properties:
        payment_intent_id: {$ref: '#/components/schemas/PaymentIntentId'}
        amount: {$ref: '#/components/schemas/Money'}
        reason: {type: string, enum: [requested_by_customer, duplicate, fraudulent, service_failure, other]}
        merchant_reference: {type: string, maxLength: 100}
    Refund:
      type: object
      additionalProperties: false
      required: [id, payment_intent_id, amount, status, reason, created_at]
      properties:
        id: {$ref: '#/components/schemas/RefundId'}
        payment_intent_id: {$ref: '#/components/schemas/PaymentIntentId'}
        amount: {$ref: '#/components/schemas/Money'}
        status: {$ref: '#/components/schemas/RefundStatus'}
        reason: {type: string}
        journal_id: {oneOf: [{$ref: '#/components/schemas/OpaqueId'}, {type: 'null'}]}
        created_at: {type: string, format: date-time}
        completed_at: {type: [string, 'null'], format: date-time}

    WebhookEndpoint:
      type: object
      additionalProperties: false
      required: [id, url, status, subscribed_event_types, signature_version, created_at, version]
      properties:
        id: {$ref: '#/components/schemas/WebhookEndpointId'}
        url: {type: string, format: uri}
        status: {type: string, enum: [pending_verification, active, disabled, revoked]}
        subscribed_event_types:
          type: array
          uniqueItems: true
          items: {type: string}
        signature_version: {type: string, enum: [atlas-hmac-v1]}
        current_key_id: {$ref: '#/components/schemas/OpaqueId'}
        created_at: {type: string, format: date-time}
        version: {type: integer, minimum: 1}
    WebhookDelivery:
      type: object
      additionalProperties: false
      required: [id, event_id, endpoint_id, status, attempt_count, created_at]
      properties:
        id: {$ref: '#/components/schemas/WebhookDeliveryId'}
        event_id: {$ref: '#/components/schemas/EventId'}
        endpoint_id: {$ref: '#/components/schemas/WebhookEndpointId'}
        status: {type: string, enum: [scheduled, attempting, retry_scheduled, succeeded, exhausted, cancelled]}
        attempt_count: {type: integer, minimum: 0}
        next_attempt_at: {type: [string, 'null'], format: date-time}
        last_http_status: {type: [integer, 'null'], minimum: 100, maximum: 599}
        last_failure_category: {type: [string, 'null'], maxLength: 80}
        created_at: {type: string, format: date-time}

    SettlementFile:
      type: object
      additionalProperties: false
      required: [id, provider, content_sha256, schema_version, status, created_at]
      properties:
        id: {$ref: '#/components/schemas/OpaqueId'}
        provider: {type: string}
        content_sha256: {type: string}
        schema_version: {type: string}
        status: {type: string, enum: [registered, validating, imported, rejected]}
        row_count: {type: [integer, 'null'], minimum: 0}
        created_at: {type: string, format: date-time}
    SettlementBatch:
      type: object
      additionalProperties: false
      required: [id, provider, currency, status, gross, fees, net, period_start, period_end]
      properties:
        id: {$ref: '#/components/schemas/SettlementBatchId'}
        provider: {type: string}
        currency: {$ref: '#/components/schemas/Currency'}
        status: {type: string, enum: [open, ready_for_close, closed, reopened]}
        gross: {$ref: '#/components/schemas/Money'}
        fees: {$ref: '#/components/schemas/Money'}
        net: {$ref: '#/components/schemas/SignedMoney'}
        period_start: {type: string, format: date-time}
        period_end: {type: string, format: date-time}
        closed_at: {type: [string, 'null'], format: date-time}
    ReconciliationRun:
      type: object
      additionalProperties: false
      required: [id, settlement_batch_id, ruleset_version, status, counts, created_at]
      properties:
        id: {$ref: '#/components/schemas/ReconciliationRunId'}
        settlement_batch_id: {$ref: '#/components/schemas/SettlementBatchId'}
        ruleset_version: {type: string}
        status: {type: string, enum: [queued, running, completed, failed]}
        counts:
          type: object
          additionalProperties: false
          required: [matched, missing_internal, missing_provider, mismatched, duplicated]
          properties:
            matched: {type: integer, minimum: 0}
            missing_internal: {type: integer, minimum: 0}
            missing_provider: {type: integer, minimum: 0}
            mismatched: {type: integer, minimum: 0}
            duplicated: {type: integer, minimum: 0}
        created_at: {type: string, format: date-time}
        completed_at: {type: [string, 'null'], format: date-time}

    SubjectReference:
      type: object
      additionalProperties: false
      required: [type, id]
      properties:
        type: {type: string, enum: [customer, merchant, wallet, transfer, payment_intent, refund, settlement_batch, provider_attempt]}
        id: {$ref: '#/components/schemas/OpaqueId'}
    Case:
      type: object
      additionalProperties: false
      required: [id, type, priority, status, subjects, created_at, version]
      properties:
        id: {$ref: '#/components/schemas/CaseId'}
        type: {type: string}
        priority: {type: string, enum: [low, medium, high, critical]}
        status: {type: string, enum: [open, investigating, pending_approval, resolved, closed]}
        subjects:
          type: array
          items: {$ref: '#/components/schemas/SubjectReference'}
        assigned_to: {oneOf: [{$ref: '#/components/schemas/OpaqueId'}, {type: 'null'}]}
        due_at: {type: [string, 'null'], format: date-time}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        version: {type: integer, minimum: 1}
    OperationsSearchResult:
      type: object
      additionalProperties: false
      required: [type, id, primary_label, secondary_label]
      properties:
        type: {type: string}
        id: {$ref: '#/components/schemas/OpaqueId'}
        primary_label: {type: string, maxLength: 200}
        secondary_label: {type: string, maxLength: 200}
        risk_marker: {type: [string, 'null'], maxLength: 80}

    Statement:
      type: object
      additionalProperties: false
      required: [id, wallet_id, period_start, period_end, timezone, status, formats, created_at]
      properties:
        id: {$ref: '#/components/schemas/StatementId'}
        wallet_id: {$ref: '#/components/schemas/WalletId'}
        period_start: {type: string, format: date}
        period_end: {type: string, format: date}
        timezone: {type: string}
        status: {type: string, enum: [queued, generating, ready, failed, expired]}
        formats:
          type: array
          items: {type: string, enum: [pdf, csv, json]}
        opening_balance: {oneOf: [{$ref: '#/components/schemas/SignedMoney'}, {type: 'null'}]}
        closing_balance: {oneOf: [{$ref: '#/components/schemas/SignedMoney'}, {type: 'null'}]}
        content_sha256: {type: [string, 'null'], pattern: '^[a-f0-9]{64}$'}
        created_at: {type: string, format: date-time}
        ready_at: {type: [string, 'null'], format: date-time}
    AuditEvent:
      type: object
      additionalProperties: false
      required: [id, actor, action, target, decision, occurred_at, correlation_id]
      properties:
        id: {$ref: '#/components/schemas/OpaqueId'}
        actor:
          type: object
          required: [type, id]
          properties:
            type: {type: string, enum: [customer, merchant_user, workforce, machine, system]}
            id: {$ref: '#/components/schemas/OpaqueId'}
        action: {type: string, maxLength: 120}
        target: {$ref: '#/components/schemas/SubjectReference'}
        decision: {type: string, enum: [allowed, denied, executed, failed]}
        reason_category: {type: [string, 'null'], maxLength: 120}
        occurred_at: {type: string, format: date-time}
        correlation_id: {$ref: '#/components/schemas/OpaqueId'}

    PageInfo:
      type: object
      additionalProperties: false
      required: [has_more]
      properties:
        next_cursor: {type: [string, 'null']}
        has_more: {type: boolean}

    ProblemFieldError:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        pointer: {type: string, maxLength: 500}
        parameter: {type: string, maxLength: 100}
        reason: {type: string, maxLength: 120}
    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status, code, request_id, retryable]
      properties:
        type: {type: string, format: uri}
        title: {type: string, maxLength: 200}
        status: {type: integer, minimum: 400, maximum: 599}
        code: {type: string, pattern: '^[A-Z0-9_]{3,120}$'}
        detail: {type: string, maxLength: 1000}
        instance: {type: string, format: uri-reference}
        request_id: {$ref: '#/components/schemas/OpaqueId'}
        correlation_id: {oneOf: [{$ref: '#/components/schemas/OpaqueId'}, {type: 'null'}]}
        retryable: {type: boolean}
        status_url: {type: string, format: uri-reference}
        errors:
          type: array
          maxItems: 100
          items: {$ref: '#/components/schemas/ProblemFieldError'}
