name: atlas-pr

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: atlas-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-and-contracts:
    name: static-contracts-secret-history
    runs-on: ubuntu-latest
    steps:
      - name: Check out complete history
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
          cache: true
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.0
      - name: Run S07 CI-equivalent static gate
        shell: pwsh
        run: ./scripts/verify-s07.ps1 -History
      - name: Compare canonical contracts to main
        shell: pwsh
        run: ./scripts/test-s07-contract-compatibility.ps1 -BaseRef origin/main

  real-integration-and-migrations:
    name: postgres-nats-migration-lanes
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.0
      - name: Run real PostgreSQL and NATS migration gate
        shell: pwsh
        run: |
          ./scripts/verify-s05.ps1 -Live -ContainerRuntime docker
          ./scripts/test-s08-constrained-pool.ps1 -RequireRace

  codeql:
    name: codeql-go-typescript-${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go for manual extraction
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Build Go entry points for CodeQL
        if: matrix.language == 'go'
        run: go build ./cmd/api ./cmd/worker ./cmd/simulator ./cmd/envctl ./cmd/dbctl ./cmd/contractctl
      - name: Analyze without repository upload
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: /language:${{ matrix.language }}
          upload: never
          output: .tmp/codeql-results
      - name: Retain CodeQL SARIF
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: s07-codeql-${{ matrix.language }}-${{ github.sha }}
          path: .tmp/codeql-results/
          if-no-files-found: error
          retention-days: 14

  supply-chain:
    name: sbom-vulnerability-license-container
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .go-version
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.0
      - name: Generate and scan source and image SBOMs
        shell: pwsh
        run: ./scripts/verify-s07.ps1 -SupplyChain -ContainerRuntime docker
      - name: Retain sanitized S07 reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: s07-supply-chain-${{ github.sha }}
          path: .tmp/s07-reports/
          if-no-files-found: error
          retention-days: 14
